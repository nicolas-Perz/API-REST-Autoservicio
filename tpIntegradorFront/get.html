<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- favicon -->

</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="" alt="Inicio"></a>
            <ul class="enlaces">
                <li class="enlace"><a href="index.html">VER</a></li>
                <li class="enlace"><a href="get.html">GET</a></li>
                <li class="enlace"><a href="post.html">POST</a></li>
                <li class="enlace"><a href="delete.html">DELETE</a></li>
                <li class="enlace"><a href="put.html">PUT</a></li>
            </ul>
        </div>
    </header>
    <main>
        <section class="form-productos">
            <h2>Consultar producto por id: </h2>
            <form id="getProduct-form">
                <label for="idProd">Id del producto</label>
                <input type="number" name="idProd" id="idProd" required>
                <input type="submit" value="Consultar producto">
            </form>
        </section>

        <section class="seccion-productos">
            <hr>
            <div id="contenedor-productos">

            </div>
        </section>
    </main>

    <script>
        // Clase 15
        const contenedorProductos = document.getElementById('contenedor-productos')
        const getProductForm = document.getElementById('getProduct-form')
        const urlBase = "http://localhost:3000/api/products"

        getProductForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            /*
            const formData = new FormData(event.target)
            // Parseo a {Objects}
            const data = Object.fromEntries(formData.entries())
            // Guardo el id del producto accediendo a data
            const idProd = data.idProd
            */
            // Otra optimizacion -> me salteo lo de parsean a {Object} y después a JSON manualmente
            const idProd = event.target.idProd.value.trim()
            // Una capa más de seguridad por si el required es salteado
            if(!idProd){
                mostrarError("Ingresá un id válido")
                return
            }
            
            try{
                const response = await fetch(`${urlBase}/${idProd}`);
                const data = await response.json()

                if(!response.ok){
                    mostrarError(data.message)
                    return
                }

                const producto = data.payload[0]

                const htmlProd = `
                    <ul>
                        <li class="lista-producto">
                            <img src="${producto.imagen}" alt="${producto.nombre}">
                            <p>Id: ${producto.id} / Nombre: ${producto.nombre} / <strong>${producto.precio}</strong></p>
                        </li>    
                    </ul>
                `;
                contenedorProductos.innerHTML = htmlProd
            }catch(e){
                console.error(e)
                // Mostramos errores de red (en el try/catch del fetch no capturamos errores 400 o 500)
                mostrarError("Error de conexion con el servidor")
            }
        })

        function mostrarError(errorMsg){
            contenedorProductos.innerHTML = `
                <p class="mensaje mensaje-error">${errorMsg}</p>
            `;
        }

    </script>

</body>
</html>
